<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT OPS | COMMAND CENTER XL</title>
    <style>
        :root {
            --bg: #05070a;
            --panel: rgba(15, 20, 35, 0.95);
            --accent: #00f2ff;
            --ok: #00ff9d;
            --critical: #ff0055;
            --text: #e0e6ed;
            --muted: #6272a4;
        }

        body {
            margin: 0;
            padding: 10px;
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Impact, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-sizing: border-box;
        }

        /* TV Scanline Effect */
        body::before {
            content: " ";
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%);
            background-size: 100% 6px;
            z-index: 100;
            pointer-events: none;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 4px solid var(--accent);
            padding: 10px 20px;
            margin-bottom: 15px;
            background: rgba(0, 242, 255, 0.05);
        }

        .title-group { display: flex; align-items: center; gap: 40px; }
        h1 { margin: 0; font-size: 3.5rem; letter-spacing: 5px; color: var(--accent); text-shadow: 0 0 15px var(--accent); }
        #clock { font-size: 3.5rem; color: var(--text); font-family: monospace; font-weight: bold; }

        #source-btn { background:none; border: 2px solid var(--accent); color:var(--accent); font-weight: bold; padding: 10px 20px; font-size: 1.2rem; cursor: pointer; }
        #source-list { 
            display: none; position: absolute; right: 20px; top: 90px; 
            background: var(--panel); border: 2px solid var(--accent); 
            padding: 20px; z-index: 1000; width: 300px; font-size: 1.2rem;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1.6fr 1fr;
            gap: 20px;
            flex: 1;
            min-height: 0;
        }

        .panel {
            background: var(--panel);
            border: 1px solid rgba(0, 242, 255, 0.2);
            padding: 25px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.5);
        }

        .panel-title {
            color: var(--accent);
            text-transform: uppercase;
            font-weight: 900;
            margin-bottom: 20px;
            border-left: 8px solid var(--accent);
            padding-left: 15px;
            font-size: 1.8rem;
        }

        .status-block { text-align: center; margin-bottom: 20px; padding: 20px; background: rgba(0,0,0,0.3); border-radius: 10px; }
        .status-label { color: var(--muted); font-size: 1.2rem; text-transform: uppercase; margin-bottom: 10px; display: block; }
        .status-val { font-size: 3rem; font-weight: 900; }
        .ok { color: var(--ok); text-shadow: 0 0 20px var(--ok); }

        /* Deployment Section XL */
        .info-box { font-size: 1.8rem; margin-bottom: 15px; line-height: 1.2; }
        .version-badge { background: var(--accent); color: #000; padding: 4px 12px; font-weight: 900; border-radius: 5px; font-size: 1.6rem; }

        .delay-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 15px; }
        .delay-box { 
            background: rgba(0,0,0,0.4); padding: 15px; border-radius: 8px; 
            text-align: center; border: 2px solid var(--muted);
        }
        .delay-box.passed { border-color: var(--ok); color: var(--ok); box-shadow: 0 0 15px rgba(0, 255, 157, 0.2); }
        .delay-box.critical-target { border-color: var(--critical); color: var(--critical); box-shadow: 0 0 15px rgba(255, 0, 85, 0.2); }
        .delay-label { font-size: 1rem; font-weight: bold; opacity: 0.8; }
        .delay-date { font-size: 1.8rem; font-weight: 900; display: block; margin-top: 5px; }

        /* Security List XL */
        #security-list { font-size: 1.3rem; line-height: 1.4; overflow-y: hidden; }
        .sec-item { margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }

        /* Infinite Ticker XL */
        .ticker-wrap {
            height: 70px;
            background: rgba(0, 242, 255, 0.1);
            border-top: 4px solid var(--accent);
            display: flex;
            align-items: center;
            overflow: hidden;
            position: relative;
        }
        
        .ticker-content {
            display: flex;
            white-space: nowrap;
            animation: scroll-infinite 60s linear infinite;
        }

        .ticker-item {
            font-size: 1.8rem;
            font-weight: 900;
            color: var(--accent);
            padding-right: 50px; /* Ruimte tussen berichten */
        }

        @keyframes scroll-infinite {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        hr { border: 0; border-top: 2px solid rgba(255,255,255,0.1); margin: 20px 0; }
    </style>
</head>
<body>

<header>
    <div class="title-group">
        <h1>COMMAND CENTER</h1>
        <div id="clock">00:00:00</div>
    </div>
    <div style="position:relative">
        <button id="source-btn" onclick="toggleSources()">SOURCES ▼</button>
        <div id="source-list">
            • Apple Status API<br>
            • Google Status API<br>
            • SOFA v2 Feed<br>
            • The Hacker News
        </div>
    </div>
</header>

<div class="grid">
    <div class="panel">
        <div class="panel-title">System Health</div>
        <div class="status-block">
            <span class="status-label">Apple Systems</span>
            <div class="status-val ok">OPERATIONAL</div>
        </div>
        <div class="status-block">
            <span class="status-label">Google Systems</span>
            <div class="status-val ok">OPERATIONAL</div>
        </div>
        <div style="margin-top: auto; padding: 15px; border: 2px dashed var(--muted); border-radius: 10px;">
            <span style="color:var(--muted); font-size: 1.1rem; font-weight: bold;">LATEST INTEL:</span><br>
            <div id="news-mini" style="font-size: 1.4rem; margin-top: 5px;">Connecting...</div>
        </div>
    </div>

    <div class="panel">
        <div class="panel-title">Deployment Tracker</div>
        <div id="mac-zone">
            <div id="mac-info" class="info-box">Loading...</div>
            <div id="mac-delays" class="delay-grid"></div>
        </div>
        <hr>
        <div id="ios-zone">
            <div id="ios-info" class="info-box">Loading...</div>
            <div id="ios-delays" class="delay-grid"></div>
        </div>
    </div>

    <div class="panel">
        <div class="panel-title">Security Advisories</div>
        <div id="security-list">
            </div>
    </div>
</div>

<div class="ticker-wrap">
    <div class="ticker-content" id="ticker-flow">
        </div>
</div>

<script>
    const proxy = "https://corsproxy.io/?";
    const urls = {
        mac: "https://sofa.macadmins.io/v2/macos_data_feed.json",
        ios: "https://sofa.macadmins.io/v2/ios_data_feed.json",
        news: "https://thehackernews.com/feeds/posts/default?alt=json&max-results=8"
    };

    function toggleSources() {
        const el = document.getElementById('source-list');
        el.style.display = el.style.display === 'block' ? 'none' : 'block';
    }

    function updateClock() {
        const el = document.getElementById('clock');
        if(el) el.textContent = new Date().toLocaleTimeString('nl-NL');
    }

    async function fetchData() {
        try {
            const mRes = await fetch(proxy + encodeURIComponent(urls.mac));
            const mData = await mRes.json();
            const latestM = mData.OSVersions[0].Latest;
            
            document.getElementById('mac-info').innerHTML = `
                <span class="version-badge">${latestM.ProductVersion}</span> <strong style="margin-left:15px">${latestM.UpdateName}</strong>
            `;
            renderDelays(latestM.ReleaseDate, 'mac-delays');

            const iRes = await fetch(proxy + encodeURIComponent(urls.ios));
            const iData = await iRes.json();
            const latestI = iData.OSVersions[0].Latest;
            
            document.getElementById('ios-info').innerHTML = `
                <span class="version-badge">${latestI.ProductVersion}</span> <strong style="margin-left:15px">iOS / iPadOS</strong>
            `;
            renderDelays(latestI.ReleaseDate, 'ios-delays');

            let secHtml = '';
            mData.OSVersions[0].SecurityReleases.slice(0,5).forEach(r => {
                secHtml += `<div class="sec-item">
                    <b style="color:var(--accent)">${r.ReleaseDate}</b><br>
                    ${r.UpdateName} <span style="color:var(--critical); margin-left:10px;">[${r.UniqueCVEsCount || 0} CVEs]</span>
                </div>`;
            });
            document.getElementById('security-list').innerHTML = secHtml;

        } catch(e) { console.error(e); }
    }

    function renderDelays(dateStr, containerId) {
        const relDate = new Date(dateStr);
        const now = new Date();
        now.setHours(0,0,0,0);
        
        let html = '';
        [7, 14].forEach(d => {
            const target = new Date(relDate);
            target.setDate(target.getDate() + d);
            const passed = now >= target;
            const isCrit = (d === 14);
            
            html += `<div class="delay-box ${passed ? 'passed' : (isCrit ? 'critical-target' : '')}">
                <div class="delay-label">${isCrit ? 'CRITICAL T+14' : 'DELAY T+7'}</div>
                <span class="delay-date">${target.toLocaleDateString('nl-NL', {day:'2-digit', month:'short'})}</span>
            </div>`;
        });
        document.getElementById(containerId).innerHTML = html;
    }

    async function fetchNews() {
        try {
            const res = await fetch(proxy + encodeURIComponent(urls.news));
            const d = await res.json();
            const entries = d.feed.entry;
            
            document.getElementById('news-mini').textContent = entries[0].title.$t;

            // Vul ticker en dupliceer voor oneindige loop
            const tickerFlow = document.getElementById('ticker-flow');
            let content = "";
            entries.forEach(e => {
                content += `<div class="ticker-item">+++ ALERT: ${e.title.$t.toUpperCase()} +++</div>`;
            });
            
            // Belangrijk: we zetten de content er twee keer in voor de naadloze loop
            tickerFlow.innerHTML = content + content;
        } catch(e) {}
    }

    window.onload = () => {
        updateClock();
        setInterval(updateClock, 1000);
        fetchData();
        fetchNews();
        setInterval(fetchData, 600000);
        setInterval(fetchNews, 900000);
    };
</script>

</body>
</html>
