<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT OPS | COMMAND CENTER</title>
    <style>
        :root {
            --bg: #05070a;
            --panel: rgba(15, 20, 35, 0.9);
            --accent: #00f2ff;
            --ok: #00ff9d;
            --error: #ff0055;
            --text: #e0e6ed;
            --muted: #6272a4;
        }

        body {
            margin: 0;
            padding: 20px;
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* TV Scanline Effect */
        body::before {
            content: " ";
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            background-size: 100% 4px;
            z-index: 100;
            pointer-events: none;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            border-bottom: 2px solid var(--accent);
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        h1 { margin: 0; font-size: 2.5rem; letter-spacing: 4px; color: var(--accent); text-shadow: 0 0 10px var(--accent); }

        .sources-wrapper { position: relative; }
        #source-list { 
            display: none; 
            position: absolute; 
            right: 0; top: 30px; 
            background: var(--panel); 
            border: 1px solid var(--accent); 
            padding: 10px; z-index: 1000; width: 250px; 
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1.5fr 1fr;
            gap: 20px;
            flex-grow: 1;
        }

        .panel {
            background: var(--panel);
            border: 1px solid rgba(0, 242, 255, 0.1);
            padding: 20px;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
        }

        .panel-title {
            color: var(--accent);
            text-transform: uppercase;
            font-weight: bold;
            margin-bottom: 15px;
            border-left: 4px solid var(--accent);
            padding-left: 10px;
        }

        .status-val { font-size: 2rem; font-weight: bold; text-align: center; margin: 10px 0; }
        .ok { color: var(--ok); text-shadow: 0 0 10px var(--ok); }

        .delay-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 10px; }
        .delay-box { 
            background: rgba(0,0,0,0.3); 
            padding: 10px; 
            border-radius: 4px; 
            text-align: center; 
            border: 1px solid var(--muted);
        }
        .delay-box.passed { border-color: var(--ok); color: var(--ok); }

        .version-badge { background: var(--accent); color: #000; padding: 2px 6px; font-weight: bold; border-radius: 3px; }

        .ticker-wrap {
            margin-top: 20px;
            background: rgba(0, 242, 255, 0.05);
            border: 1px solid var(--accent);
            padding: 10px;
            overflow: hidden;
            white-space: nowrap;
        }
        #ticker { display: inline-block; animation: scroll 40s linear infinite; font-weight: bold; color: var(--accent); }
        @keyframes scroll { from { transform: translateX(100%); } to { transform: translateX(-100%); } }
    </style>
</head>
<body>

<header>
    <div>
        <h1>COMMAND CENTER</h1>
        <div id="clock" style="font-size: 1.2rem; color: var(--muted);">--:--:--</div>
    </div>
    <div class="sources-wrapper">
        <button onclick="document.getElementById('source-list').style.display = document.getElementById('source-list').style.display === 'block' ? 'none' : 'block'" 
                style="background:none; border:1px solid var(--accent); color:var(--accent); cursor:pointer;">SOURCES ▼</button>
        <div id="source-list">
            <small>
                • Apple & Google Status<br>
                • SOFA v2 API<br>
                • The Hacker News
            </small>
        </div>
    </div>
</header>

<div class="grid">
    <div class="panel">
        <div class="panel-title">System Health</div>
        <small style="color:var(--muted)">APPLE</small>
        <div class="status-val ok">Operational</div>
        <small style="color:var(--muted); margin-top:20px;">GOOGLE SEARCH</small>
        <div class="status-val ok">Stable</div>
    </div>

    <div class="panel">
        <div class="panel-title">Deployment Tracker</div>
        <div id="mac-zone">
            <div id="mac-info">Loading macOS...</div>
            <div id="mac-delays" class="delay-grid"></div>
        </div>
        <hr style="width:100%; border:0; border-top:1px solid rgba(255,255,255,0.1); margin:20px 0;">
        <div id="ios-zone">
            <div id="ios-info">Loading iOS...</div>
            <div id="ios-delays" class="delay-grid"></div>
        </div>
    </div>

    <div class="panel">
        <div class="panel-title">Security Intel</div>
        <div id="security-list" style="font-size: 0.9rem;">Wachten op data...</div>
    </div>
</div>

<div class="ticker-wrap">
    <div id="ticker">SYSTEM STARTUP... INITIALIZING SECURE DATA STREAMS...</div>
</div>

<script>
    // Gebruik een stabiele CORS proxy
    const proxy = "https://corsproxy.io/?";
    const urls = {
        mac: "https://sofa.macadmins.io/v2/macos_data_feed.json",
        ios: "https://sofa.macadmins.io/v2/ios_data_feed.json",
        news: "https://thehackernews.com/feeds/posts/default?alt=json&max-results=5"
    };

    function updateClock() {
        const el = document.getElementById('clock');
        if(el) el.textContent = new Date().toLocaleTimeString('nl-NL');
    }

    async function fetchData() {
        try {
            // macOS
            const mRes = await fetch(proxy + encodeURIComponent(urls.mac));
            const mData = await mRes.json();
            const latestM = mData.OSVersions[0].Latest;
            
            document.getElementById('mac-info').innerHTML = `
                <span class="version-badge">${latestM.ProductVersion}</span> <strong>${latestM.UpdateName}</strong>
            `;
            renderDelays(latestM.ReleaseDate, 'mac-delays');

            // iOS
            const iRes = await fetch(proxy + encodeURIComponent(urls.ios));
            const iData = await iRes.json();
            const latestI = iData.OSVersions[0].Latest;
            
            document.getElementById('ios-info').innerHTML = `
                <span class="version-badge">${latestI.ProductVersion}</span> <strong>iOS Release</strong>
            `;
            renderDelays(latestI.ReleaseDate, 'ios-delays');

            // Security
            let secHtml = '';
            mData.OSVersions[0].SecurityReleases.slice(0,5).forEach(r => {
                secHtml += `<div style="margin-bottom:10px;">
                    <b style="color:var(--accent)">${r.ReleaseDate}</b><br>${r.UpdateName}
                </div>`;
            });
            document.getElementById('security-list').innerHTML = secHtml;

        } catch(e) {
            console.error(e);
            document.getElementById('mac-info').textContent = "Data Error";
        }
    }

    function renderDelays(dateStr, containerId) {
        const relDate = new Date(dateStr);
        const now = new Date();
        now.setHours(0,0,0,0);
        
        let html = '';
        [7, 14, 21].forEach(d => {
            const target = new Date(relDate);
            target.setDate(target.getDate() + d);
            const passed = now >= target;
            html += `<div class="delay-box ${passed ? 'passed' : ''}">
                <small>T+${d}</small><br>
                <b>${target.toLocaleDateString('nl-NL', {day:'2-digit', month:'short'})}</b>
            </div>`;
        });
        document.getElementById(containerId).innerHTML = html;
    }

    async function fetchNews() {
        try {
            const res = await fetch(proxy + encodeURIComponent(urls.news));
            const d = await res.json();
            let txt = " +++ ";
            d.feed.entry.forEach(e => { txt += ` ALERT: ${e.title.$t} ••• `; });
            document.getElementById('ticker').textContent = txt;
        } catch(e) {}
    }

    // Start
    window.onload = () => {
        updateClock();
        setInterval(updateClock, 1000);
        fetchData();
        fetchNews();
    };
</script>

</body>
</html>
