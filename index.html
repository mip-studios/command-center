<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT OPS | COMMAND CENTER XL</title>
    <style>
        :root {
            --bg: #05070a;
            --panel: rgba(15, 23, 42, 0.95);
            --accent: #00f2ff;
            --ok: #00ff9d;
            --critical: #ff0055;
            --text: #ffffff;
            --muted: #94a3b8;
            --font-display: 'Impact', sans-serif; /* Alleen voor de hoofdtitel */
            --font-main: 'Segoe UI', 'Inter', system-ui, sans-serif; /* Voor alle leesbare tekst */
        }

        body {
            margin: 0;
            padding: 10px;
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-sizing: border-box;
        }

        /* Subtiel achtergrond effect (geen strepen meer over de tekst) */
        body::before {
            content: " ";
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%);
            background-size: 100% 8px;
            z-index: -1;
            pointer-events: none;
        }

        header {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            border-bottom: 4px solid var(--accent);
            padding: 15px 30px;
            margin-bottom: 15px;
            background: rgba(0, 242, 255, 0.03);
        }

        h1 { 
            margin: 0; 
            font-size: 2.8rem; 
            letter-spacing: 4px; 
            color: var(--accent); 
            font-family: var(--font-display);
            text-shadow: 0 0 15px rgba(0, 242, 255, 0.5);
        }

        .center-clock-group {
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        #clock { 
            font-size: 4.5rem; 
            color: var(--text); 
            font-weight: 800; 
            line-height: 1;
            font-variant-numeric: tabular-nums;
        }

        #date {
            font-size: 1.8rem;
            color: var(--accent);
            font-weight: 600;
            letter-spacing: 2px;
        }

        .sources-wrapper { text-align: right; }
        #source-btn { 
            background: transparent; 
            border: 2px solid var(--muted); 
            color: var(--muted); 
            padding: 8px 15px; 
            font-size: 1rem; 
            cursor: pointer;
            border-radius: 4px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1.6fr 1.4fr;
            gap: 20px;
            flex: 1;
            min-height: 0;
        }

        .panel {
            background: var(--panel);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 25px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .panel-title {
            color: var(--accent);
            text-transform: uppercase;
            font-weight: 800;
            margin-bottom: 25px;
            border-left: 10px solid var(--accent);
            padding-left: 20px;
            font-size: 2rem;
            letter-spacing: 1px;
        }

        .status-block { 
            text-align: center; 
            margin-bottom: 25px; 
            padding: 25px; 
            background: rgba(255,255,255,0.03); 
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .status-label { color: var(--muted); font-size: 1.4rem; text-transform: uppercase; margin-bottom: 10px; display: block; font-weight: 600; }
        .status-val { font-size: 3.2rem; font-weight: 900; }
        .ok { color: var(--ok); text-shadow: 0 0 20px rgba(0, 255, 157, 0.4); }

        .info-box { font-size: 2rem; margin-bottom: 15px; font-weight: 700; }
        .version-badge { background: var(--accent); color: #000; padding: 4px 14px; font-weight: 900; border-radius: 6px; font-size: 1.8rem; }

        .delay-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 15px; }
        .delay-box { 
            background: rgba(0,0,0,0.4); padding: 20px; border-radius: 10px; 
            text-align: center; border: 3px solid #334155;
        }
        .delay-box.passed { border-color: var(--ok); color: var(--ok); }
        .delay-box.critical-target { border-color: var(--critical); color: var(--critical); }
        .delay-label { font-size: 1.2rem; font-weight: 800; margin-bottom: 5px; }
        .delay-date { font-size: 2.2rem; font-weight: 900; display: block; }

        #security-list { font-size: 1.5rem; }
        .sec-item { margin-bottom: 25px; border-bottom: 2px solid rgba(255,255,255,0.05); padding-bottom: 15px; }

        .ticker-wrap {
            height: 80px;
            background: #0f172a;
            border-top: 4px solid var(--accent);
            display: flex;
            align-items: center;
            overflow: hidden;
        }
        
        .ticker-content {
            display: flex;
            white-space: nowrap;
            animation: scroll-infinite 80s linear infinite;
        }

        .ticker-item {
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent);
            padding-right: 80px;
        }

        @keyframes scroll-infinite {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        hr { border: 0; border-top: 2px solid rgba(255,255,255,0.1); margin: 25px 0; }
    </style>
</head>
<body>

<header>
    <h1>COMMAND CENTER</h1>
    <div class="center-clock-group">
        <div id="clock">00:00:00</div>
        <div id="date">00-00-0000</div>
    </div>
    <div class="sources-wrapper">
        <button id="source-btn">SOURCES</button>
    </div>
</header>

<div class="grid">
    <div class="panel">
        <div class="panel-title">System Health</div>
        <div class="status-block">
            <span class="status-label">Apple Fleet</span>
            <div class="status-val ok">OPERATIONAL</div>
        </div>
        <div class="status-block">
            <span class="status-label">Google Services</span>
            <div class="status-val ok">OPERATIONAL</div>
        </div>
        <div style="margin-top: auto; padding: 20px; background: rgba(0, 242, 255, 0.05); border-radius: 10px;">
            <span style="color:var(--accent); font-size: 1.2rem; font-weight: 800; text-transform: uppercase;">Latest Intel:</span>
            <div id="news-mini" style="font-size: 1.6rem; margin-top: 10px; font-weight: 600; line-height: 1.3;">Fetching data...</div>
        </div>
    </div>

    <div class="panel">
        <div class="panel-title">Deployment Tracker</div>
        <div id="mac-zone">
            <div id="mac-info" class="info-box">Loading macOS...</div>
            <div id="mac-delays" class="delay-grid"></div>
        </div>
        <hr>
        <div id="ios-zone">
            <div id="ios-info" class="info-box">Loading iOS...</div>
            <div id="ios-delays" class="delay-grid"></div>
        </div>
    </div>

    <div class="panel">
        <div class="panel-title">Security Advisories</div>
        <div id="security-list"></div>
    </div>
</div>

<div class="ticker-wrap">
    <div class="ticker-content" id="ticker-flow">
        <div class="ticker-item">+++ INITIALIZING SECURE STREAMS... +++</div>
    </div>
</div>

<script>
    const proxy = "https://corsproxy.io/?";
    const urls = {
        mac: "https://sofa.macadmins.io/v2/macos_data_feed.json",
        ios: "https://sofa.macadmins.io/v2/ios_data_feed.json",
        news: "https://thehackernews.com/feeds/posts/default?alt=json&max-results=8"
    };

    function updateTime() {
        const now = new Date();
        document.getElementById('clock').textContent = now.toLocaleTimeString('nl-NL');
        
        const d = String(now.getDate()).padStart(2, '0');
        const m = String(now.getMonth() + 1).padStart(2, '0');
        const y = now.getFullYear();
        document.getElementById('date').textContent = `${d}-${m}-${y}`;
    }

    async function fetchData() {
        try {
            const mRes = await fetch(proxy + encodeURIComponent(urls.mac));
            const mData = await mRes.json();
            const latestM = mData.OSVersions[0].Latest;
            
            document.getElementById('mac-info').innerHTML = `
                <span class="version-badge">${latestM.ProductVersion}</span> <span style="margin-left:15px">${latestM.UpdateName}</span>
            `;
            renderDelays(latestM.ReleaseDate, 'mac-delays');

            const iRes = await fetch(proxy + encodeURIComponent(urls.ios));
            const iData = await iRes.json();
            const latestI = iData.OSVersions[0].Latest;
            
            document.getElementById('ios-info').innerHTML = `
                <span class="version-badge">${latestI.ProductVersion}</span> <span style="margin-left:15px">iOS / iPadOS</span>
            `;
            renderDelays(latestI.ReleaseDate, 'ios-delays');

            let secHtml = '';
            mData.OSVersions[0].SecurityReleases.slice(0,5).forEach(r => {
                secHtml += `<div class="sec-item">
                    <b style="color:var(--accent)">${r.ReleaseDate}</b><br>
                    ${r.UpdateName} <span style="color:var(--critical); font-weight: 800;">[${r.UniqueCVEsCount || 0} CVEs]</span>
                </div>`;
            });
            document.getElementById('security-list').innerHTML = secHtml;
        } catch(e) { console.error(e); }
    }

    function renderDelays(dateStr, containerId) {
        const relDate = new Date(dateStr);
        const now = new Date();
        now.setHours(0,0,0,0);
        
        let html = '';
        [7, 14].forEach(d => {
            const target = new Date(relDate);
            target.setDate(target.getDate() + d);
            const passed = now >= target;
            const isCrit = (d === 14);
            
            html += `<div class="delay-box ${passed ? 'passed' : (isCrit ? 'critical-target' : '')}">
                <div class="delay-label">${isCrit ? 'CRITICAL T+14' : 'DELAY T+7'}</div>
                <span class="delay-date">${target.toLocaleDateString('nl-NL', {day:'2-digit', month:'short'})}</span>
            </div>`;
        });
        document.getElementById(containerId).innerHTML = html;
    }

    async function fetchNews() {
        try {
            const res = await fetch(proxy + encodeURIComponent(urls.news));
            const d = await res.json();
            const entries = d.feed.entry;
            
            document.getElementById('news-mini').textContent = entries[0].title.$t;

            const tickerFlow = document.getElementById('ticker-flow');
            let content = "";
            entries.forEach(e => {
                content += `<div class="ticker-item">+++ ${e.title.$t.toUpperCase()} +++</div>`;
            });
            tickerFlow.innerHTML = content + content;
        } catch(e) {}
    }

    window.onload = () => {
        updateTime();
        setInterval(updateTime, 1000);
        fetchData();
        fetchNews();
        setInterval(fetchData, 600000);
        setInterval(fetchNews, 900000);
    };
</script>

</body>
</html>
