<script>
    // Gebruik een specifiekere proxy URL voor betere compatibiliteit
    const PROXY = "https://api.allorigins.win/get?url=";
    const SOFA_MAC = "https://sofa.macadmins.io/v2/macos_data_feed.json";
    const SOFA_IOS = "https://sofa.macadmins.io/v2/ios_data_feed.json";

    function toggleSources() {
        const list = document.getElementById('source-list');
        list.style.display = list.style.display === 'block' ? 'none' : 'block';
    }

    function updateClock() {
        document.getElementById('clock').textContent = new Date().toLocaleTimeString('nl-NL');
    }
    setInterval(updateClock, 1000);

    function calculateDelays(releaseDateStr, containerId) {
        const releaseDate = new Date(releaseDateStr);
        if (isNaN(releaseDate)) return;
        
        const now = new Date();
        const delays = [7, 14, 21];
        let html = '';

        delays.forEach(days => {
            const targetDate = new Date(releaseDate);
            targetDate.setDate(targetDate.getDate() + days);
            
            // Vergelijk puur op datum, niet op tijd
            const isPassed = now.setHours(0,0,0,0) >= targetDate.setHours(0,0,0,0);
            const statusClass = isPassed ? 'passed' : 'future';
            const icon = isPassed ? '✅' : '⏳';
            
            html += `
                <div class="delay-box ${statusClass}">
                    <span class="delay-label">${icon} T+${days}</span>
                    <span class="delay-date">${targetDate.toLocaleDateString('nl-NL', {day:'2-digit', month:'short'})}</span>
                </div>
            `;
        });
        document.getElementById(containerId).innerHTML = html;
    }

    async function getJson(url) {
        const response = await fetch(PROXY + encodeURIComponent(url));
        if (!response.ok) throw new Error('Network response was not ok');
        const data = await response.json();
        // AllOrigins verpakt de data in een 'contents' string die we moeten parsen
        return JSON.parse(data.contents);
    }

    async function refreshData() {
        try {
            // 1. macOS Data
            const macData = await getJson(SOFA_MAC);
            const latestMac = macData.OSVersions[0].Latest;
            
            document.getElementById('mac-info').innerHTML = `
                <span class="version-tag">${latestMac.ProductVersion}</span> 
                <strong>${latestMac.UpdateName}</strong><br>
                <small>Build: ${latestMac.Build} | Released: ${latestMac.ReleaseDate}</small>
            `;
            calculateDelays(latestMac.ReleaseDate, 'mac-delays');

            // 2. iOS Data
            const iosData = await getJson(SOFA_IOS);
            const latestIos = iosData.OSVersions[0].Latest;

            document.getElementById('ios-info').innerHTML = `
                <span class="version-tag">${latestIos.ProductVersion}</span> 
                <strong>iOS / iPadOS</strong><br>
                <small>Released: ${latestIos.ReleaseDate}</small>
            `;
            calculateDelays(latestIos.ReleaseDate, 'ios-delays');

            // 3. Security Advisory List
            let secHtml = '';
            const securityReleases = macData.OSVersions[0].SecurityReleases || [];
            securityReleases.slice(0, 6).forEach(rel => {
                const cveCount = rel.UniqueCVEsCount || 0;
                const severity = cveCount > 10 ? 'error' : (cveCount > 0 ? 'warn' : 'ok');
                secHtml += `
                    <div style="margin-bottom: 12px; border-bottom: 1px solid rgba(0, 242, 255, 0.1); padding-bottom: 8px;">
                        <span style="color:var(--accent); font-weight:bold;">${rel.ReleaseDate}</span>
                        <span style="float:right;" class="${severity}">${cveCount} CVEs</span><br>
                        <span style="font-size:1.1rem;">${rel.UpdateName}</span>
                    </div>
                `;
            });
            document.getElementById('security-list').innerHTML = secHtml;

        } catch (e) {
            console.error("Fout bij ophalen data:", e);
            document.getElementById('mac-info').innerHTML = `<span class="error">DATA OFFLINE - Check Console</span>`;
        }
    }

    // Hacker News Feed via alternatieve weg als CORS lastig doet
    async function fetchNews() {
        try {
            const newsData = await getJson("https://thehackernews.com/feeds/posts/default?alt=json&max-results=5");
            const entries = newsData.feed.entry;
            
            if(entries && entries.length > 0) {
                const latestTitle = entries[0].title.$t;
                document.getElementById('news-mini').innerHTML = latestTitle;
                
                let ticker = "+++ SYSTEM ONLINE +++ ";
                entries.forEach(e => { ticker += ` SECURITY ALERT: ${e.title.$t} ••• `; });
                document.getElementById('ticker-content').textContent = ticker;
            }
        } catch (e) {
            document.getElementById('news-mini').textContent = "News feed temporarily unavailable";
        }
    }

    // Start alles op
    refreshData();
    fetchNews();
    
    // Auto-refresh elke 15 minuten voor stabiliteit
    setInterval(refreshData, 900000);
    setInterval(fetchNews, 900000);
</script>
